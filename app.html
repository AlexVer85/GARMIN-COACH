<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach IA Garmin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #1a1a1a; }
.header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 12px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 16px; font-weight: 600; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #E1F5EE; color: #0F6E56; font-weight: 500; margin-left: auto; }
.metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px; }
.mc { background: #fff; border-radius: 12px; padding: 14px; border: 1px solid #e5e5e5; }
.ml { font-size: 12px; color: #888; margin-bottom: 4px; }
.mv { font-size: 24px; font-weight: 600; }
.ms { font-size: 11px; color: #aaa; margin-top: 2px; }
.alert { margin: 0 16px 12px; padding: 10px 14px; border-radius: 10px; background: #FFF8E6; color: #7A5000; font-size: 13px; border: 1px solid #FFE4A0; }
.section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding: 0 16px 8px; }
.acts { display: flex; gap: 10px; padding: 0 16px 16px; overflow-x: auto; }
.act { background: #fff; border-radius: 12px; padding: 12px 14px; border: 1px solid #e5e5e5; min-width: 140px; flex-shrink: 0; }
.at { font-size: 11px; color: #888; margin-bottom: 4px; }
.an { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.as { font-size: 11px; color: #aaa; }
.sports { display: flex; gap: 8px; padding: 0 16px 16px; }
.sb { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; }
.sb.active { background: #EBF4FF; border-color: #378ADD; color: #185FA5; }
.gen-btn { display: block; margin: 0 16px 16px; width: calc(100% - 32px); padding: 14px; border-radius: 12px; border: none; background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
.gen-btn:disabled { opacity: 0.4; }
.chat-area { background: #fff; border-top: 1px solid #e5e5e5; display: flex; flex-direction: column; min-height: 300px; }
.msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; max-height: 400px; }
.msg { display: flex; gap: 8px; }
.msg.user { flex-direction: row-reverse; }
.av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.av.c { background: #EBF4FF; color: #185FA5; }
.av.u { background: #f0f0f0; color: #666; }
.bub { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; max-width: 82%; }
.msg.user .bub { background: #1a1a1a; color: #fff; }
.msg.coach .bub { background: #f0f0f0; color: #1a1a1a; }
.bub.loading { color: #999; background: #f0f0f0; }
.inp-area { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #e5e5e5; background: #fff; }
.inp-area input { flex: 1; border: 1px solid #e5e5e5; border-radius: 22px; padding: 10px 16px; font-size: 14px; outline: none; background: #f5f5f5; }
.inp-area button { width: 42px; height: 42px; border-radius: 50%; border: none; background: #1a1a1a; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; }
.inp-area button:disabled { opacity: 0.4; }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: #888; font-size: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <span>⌚</span>
  <h1>Coach IA Garmin</h1>
  <span class="badge" id="badge">Chargement...</span>
</div>

<div id="loading" class="loading-screen">
  <div class="spinner"></div>
  <p>Connexion à Garmin...</p>
</div>

<div id="main" style="display:none">
  <div class="metrics" id="metrics"></div>
  <div class="alert" id="alert" style="display:none"></div>
  <p class="section-title">Dernières activités</p>
  <div class="acts" id="acts"></div>
  <p class="section-title">Générer une séance</p>
  <div class="sports">
    <button class="sb active" data-sport="trail" onclick="selectSport(this)">🏃 Trail</button>
    <button class="sb" data-sport="muscu" onclick="selectSport(this)">🏋️ Muscu</button>
    <button class="sb" data-sport="hyrox" onclick="selectSport(this)">🔥 Hyrox</button>
  </div>
  <button class="gen-btn" id="gen-btn" onclick="generate()">Générer ma séance ↗</button>
  <div class="chat-area">
    <div class="msgs" id="msgs">
      <div class="msg coach"><div class="av c">IA</div><div class="bub" id="welcome">Données chargées ! Choisis un sport et génère ta séance.</div></div>
    </div>
    <div class="inp-area">
      <input id="inp" type="text" placeholder="Pose une question..." onkeydown="if(event.key==='Enter') send()" />
      <button id="send-btn" onclick="send()">↑</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
let data = null, sport = 'trail', hist = [], busy = false;

async function init() {
  try {
    const r = await fetch(BASE + '/data');
    data = await r.json();
    if (data.error) throw new Error(data.error);
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#e24b4a;text-align:center">Erreur de connexion.<br><small>' + e.message + '</small></p>';
  }
}

function render() {
  const h = data.hrv || {}, s = data.sleep || {}, bb = data.body_battery || {};
  const bbVals = bb.bodyBatteryValuesArray || [];
  const lastBB = bbVals.length ? bbVals[bbVals.length-1][1] : null;
  const sleepMin = s.sleepTimeSeconds ? Math.round(s.sleepTimeSeconds/60) : 0;
  const sh = Math.floor(sleepMin/60), sm = sleepMin % 60;
  const score = s.sleepScores?.overall?.value;

  document.getElementById('badge').textContent = 'Live ' + (data.date||'');
  document.getElementById('metrics').innerHTML = `
    <div class="mc"><div class="ml">HRV</div><div class="mv">${h.lastNightAvg||'—'} ms</div><div class="ms">${h.status||'—'}</div></div>
    <div class="mc"><div class="ml">Sommeil</div><div class="mv">${sh}h${sm||''}</div><div class="ms">score ${score||'—'}/100</div></div>
    <div class="mc"><div class="ml">Body Battery</div><div class="mv">${lastBB||'—'}</div><div class="ms">+${bb.charged||0} cette nuit</div></div>
    <div class="mc"><div class="ml">FC repos</div><div class="mv">${s.avgHeartRate ? Math.round(s.avgHeartRate) : '—'}</div><div class="ms">bpm</div></div>`;

  if (score && score < 65) {
    const a = document.getElementById('alert');
    a.style.display = 'block';
    a.textContent = '⚠️ Nuit courte (score ' + score + '/100) — intensité modérée recommandée.';
  }

  const acts = data.activities || [];
  const typeLabel = { strength_training: '🏋️ Muscu', indoor_cardio: '🔥 Cardio', running: '🏃 Course' };
  document.getElementById('acts').innerHTML = acts.slice(0,4).map(a =>
    `<div class="act"><div class="at">${typeLabel[a.type]||a.type||'—'}</div><div class="an">${a.name||'—'}</div><div class="as">${a.date||''} · ${a.duration||0} min</div></div>`
  ).join('');

  const bbVals2 = bb.bodyBatteryValuesArray || [];
  const lbb = bbVals2.length ? bbVals2[bbVals2.length-1][1] : '?';
  document.getElementById('welcome').textContent = `Live ${data.date} — HRV ${h.lastNightAvg||'?'} ms (${h.status||'?'}), BB ${lbb}/100. Choisis ton sport !`;
}

function selectSport(btn) {
  document.querySelectorAll('.sb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sport = btn.dataset.sport;
}

function sysPrompt() {
  const h = data.hrv||{}, s = data.sleep||{}, bb = data.body_battery||{};
  const bbVals = bb.bodyBatteryValuesArray||[];
  const lastBB = bbVals.length ? bbVals[bbVals.length-1][1] : '?';
  const sleepMin = s.sleepTimeSeconds ? Math.round(s.sleepTimeSeconds/60) : 0;
  const acts = (data.activities||[]).map(a => `- ${a.name} (${a.date}) : ${a.duration}min, FC ${a.hrAvg}, ${a.calories} kcal`).join('\n');
  return `Tu es un coach sportif expert trail/musculation/Hyrox et nutrition.
DONNÉES GARMIN LIVE (${data.date}):
- HRV: ${h.lastNightAvg||'?'}ms — ${h.status||'?'} (zone ${h.baseline?.balancedLow||'?'}–${h.baseline?.balancedUpper||'?'})
- Sommeil: ${Math.floor(sleepMin/60)}h${sleepMin%60} — score ${s.sleepScores?.overall?.value||'?'}/100 — profond ${s.deepSleepSeconds ? Math.round(s.deepSleepSeconds/60)+'min' : '?'}
- Body Battery: ${lastBB}/100 — FC repos ${s.avgHeartRate ? Math.round(s.avgHeartRate) : '?'}bpm — SpO2 ${s.averageSpO2Value||'?'}%
ACTIVITÉS RÉCENTES:\n${acts}
PROFIL: Alexandre, 39 ans, trail/muscu/hyrox 3x/sem. Objectifs: trail 20km nov 2026, Hyrox oct 2026.
Adapte séances ET alimentation à l'état du jour. Concis et actionnable. Réponds en français.`;
}

async function generate() {
  if (!data || busy) return;
  const labels = { trail:'Trail / Course à pied', muscu:'Musculation', hyrox:'Hyrox / Circuit' };
  await chat(`Génère une séance de ${labels[sport]} pour aujourd'hui basée sur mes données Garmin.`);
}

async function send() {
  const inp = document.getElementById('inp');
  const t = inp.value.trim();
  if (!t || busy) return;
  inp.value = '';
  await chat(t);
}

function addMsg(role, text, html=false) {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ' + (role==='assistant' ? 'coach' : 'user');
  const av = document.createElement('div');
  av.className = 'av ' + (role==='assistant' ? 'c' : 'u');
  av.textContent = role==='assistant' ? 'IA' : 'Ar';
  const b = document.createElement('div');
  b.className = 'bub';
  if (html) b.innerHTML = text; else b.textContent = text;
  d.appendChild(av); d.appendChild(b);
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  return b;
}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^- (.*)/gm,'<li>$1</li>').replace(/(<li>.*<\/li>)/gs,'<ul style="padding-left:16px;margin:6px 0">$1</ul>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

async function chat(userText) {
  busy = true;
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('send-btn').disabled = true;
  addMsg('user', userText);
  hist.push({ role:'user', content:userText });
  const lb = addMsg('assistant', '...');
  lb.classList.add('loading');
  try {
    const res = await fetch(BASE + '/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000, system:sysPrompt(), messages:hist })
    });
    const d = await res.json();
    const reply = d.content?.[0]?.text || 'Erreur';
    lb.classList.remove('loading');
    lb.innerHTML = fmt(reply);
    hist.push({ role:'assistant', content:reply });
    document.getElementById('msgs').scrollTop = 99999;
  } catch(e) {
    lb.textContent = 'Erreur: ' + e.message;
    lb.classList.remove('loading');
  }
  busy = false;
  document.getElementById('gen-btn').disabled = false;
  document.getElementById('send-btn').disabled = false;
}

init();
</script>
</body>
</html>
